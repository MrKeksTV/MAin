<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MrKeksTV - Meine Kanäle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #121214 0%, #1a1a2e 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 40px 20px;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #ff4655; /* Gaming-Rot/Orange Akzent */
            object-fit: cover;
            margin-bottom: 16px;
            box-shadow: 0 0 20px rgba(255, 70, 85, 0.2);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .bio {
            font-size: 14px;
            color: #b3b3b3;
            margin-bottom: 32px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            text-decoration: none;
            color: #ffffff;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.25s ease;
            font-size: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Spezifische Farben für deine Plattformen */
        .youtube {
            background: rgba(255, 0, 0, 0.1);
            border-color: rgba(255, 0, 0, 0.4);
        }
        .youtube:hover {
            background: #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
            transform: translateY(-2px);
        }

        .twitch {
            background: rgba(145, 70, 255, 0.1);
            border-color: rgba(145, 70, 255, 0.4);
        }
        .twitch:hover {
            background: #9146ff;
            box-shadow: 0 0 15px rgba(145, 70, 255, 0.4);
            transform: translateY(-2px);
        }

        .discord {
            background: rgba(88, 101, 242, 0.1);
            border-color: rgba(88, 101, 242, 0.4);
        }
        .discord:hover {
            background: #5865f2;
            box-shadow: 0 0 15px rgba(88, 101, 242, 0.4);
            transform: translateY(-2px);
        }

        .gaming {
            background: rgba(255, 255, 255, 0.05);
        }
        .gaming:hover {
            background: #ffffff;
            color: #121214;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Profilbild (Ersetze 'youtube-avatar.png' mit deinem echten Bildnamen) -->
        <img src="youtube-avatar.png" alt="MrKeksTV Profilbild" class="profile-img" onerror="this.src='https://via.placeholder.com/150'">
        
        <h1>MrKeksTV</h1>
        <p class="bio">Welcome to my Hub! Check out my streams, videos and socials. 🚀</p>

        <div class="links-container">
            <!-- YouTube Link -->
            <a href="DEIN_YOUTUBE_LINK_HIER" target="_blank" class="link-card youtube">
                YouTube
            </a>

            <!-- Twitch Link -->
            <a href="DEIN_TWITCH_LINK_HIER" target="_blank" class="link-card twitch">
                Twitch
            </a>

            <!-- Discord Link -->
            <a href="DEIN_DISCORD_LINK_HIER" target="_blank" class="link-card discord">
                Community Discord
            </a>

            <!-- Gaming/Roblox/Minecraft Link (Optional) -->
            <a href="DEIN_GAMING_PROFILE_LINK" target="_blank" class="link-card gaming">
                Gaming Profiles
            </a>
        </div>
    </div>

</body>
</html>
